<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه رنک ماینکرفت</title>

<style>

body{
    background:#121212;
    font-family:tahoma;
    text-align:center;
    color:white;
}

h1{
    margin-top:30px;
}

.rank{
    width:320px;
    margin:20px auto;
    padding:20px;
    border-radius:20px;
    color:white;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
    transition:0.3s;
}

.rank:hover{
    transform:scale(1.05);
}

button{
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

button:active{
    transform:scale(0.9);
}

.vip{background:#28a745;}
.vipplus{background:#20c997;}
.mvp{background:#007bff;}
.mvpplus{background:#0056d2;}
.legend{background:#d4a017;}
.titan{background:#dc3545;}
.diamond{background:#00cfe8;}

</style>

</head>
<body>

<h1>🎮 فروشگاه رنک سرور ماینکرفت 🎮</h1>

<div class="rank vip">
<h2>VIP 🟢</h2>
<p>50 هزار تومان
    <button onclick="window.open('https://rubika.ir/xjames666')">
خرید رنک
</button>
</div>

<div class="rank vipplus">
<h2>VIP+ 🟩</h2>
<p>80 هزار تومان</p>
<button onclick="buy('VIP+')">خرید</button>
</div>

<div class="rank mvp">
<h2>MVP 🔵</h2>
<p>100 هزار تومان</p>
<button onclick="buy('MVP')">خرید</button>
</div>

<div class="rank mvpplus">
<h2>MVP+ 💙</h2>
<p>150 هزار تومان</p>
<button onclick="buy('MVP+')">خرید</button>
</div>

<div class="rank legend">
<h2>LEGEND 🟨</h2>
<p>200 هزار تومان</p>
<button onclick="buy('LEGEND')">خرید</button>
</div>

<div class="rank titan">
<h2>TITAN 🔴</h2>
<p>300 هزار تومان</p>
<button onclick="buy('TITAN')">خرید</button>
</div>

<div class="rank diamond">
<h2>DIAMOND 💎</h2>
<p>500 هزار تومان</p>
<button onclick="buy('DIAMOND')">خرید</button>
</div>

<script>
function buy(rank){
    alert("جهت خرید رنک به ایدی روبیکای" + rank + " xjames666 پیام دهید");
} 
</script>

</body>
</html>
